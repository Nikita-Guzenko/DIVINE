name: Auto Scrape Candidates

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run auto sync pipeline
        env:
          CAREERPLUG_EMAIL: ${{ secrets.CAREERPLUG_EMAIL }}
          CAREERPLUG_PASSWORD: ${{ secrets.CAREERPLUG_PASSWORD }}
          CDLJOBS_EMAIL: ${{ secrets.CDLJOBS_EMAIL }}
          CDLJOBS_PASSWORD: ${{ secrets.CDLJOBS_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
        working-directory: scripts
        run: python auto_sync.py
