<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Enterprises — Recruiting Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 20px 32px; }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header h1 span { color: #3b82f6; }
        .header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }

        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 24px 32px; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        .stat-card .number { font-size: 36px; font-weight: 700; }
        .stat-card .label { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .stat-card.blue .number { color: #3b82f6; }
        .stat-card.green .number { color: #22c55e; }
        .stat-card.yellow .number { color: #eab308; }
        .stat-card.red .number { color: #ef4444; }
        .stat-card.purple .number { color: #a855f7; }

        .content { padding: 0 32px 32px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .toolbar h2 { font-size: 18px; }
        .filters { display: flex; gap: 8px; }
        .filter-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
        thead th { background: #0f172a; padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: 600; letter-spacing: 0.05em; }
        tbody td { padding: 14px 16px; border-top: 1px solid #1e293b; font-size: 14px; }
        tbody tr { background: #1e293b; transition: background 0.15s; }
        tbody tr:hover { background: #263348; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-new { background: #1e3a5f; color: #60a5fa; }
        .badge-team { background: #14532d; color: #4ade80; }
        .badge-solo { background: #422006; color: #fbbf24; }
        .badge-screening { background: #3b0764; color: #c084fc; }

        .source-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
        .source-cdljobs { background: #1e3a5f; color: #60a5fa; }
        .source-careerplug { background: #14532d; color: #4ade80; }

        .team-yes { color: #22c55e; font-weight: 600; }
        .team-no { color: #64748b; }

        select.status-select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        select.status-select:focus { outline: none; border-color: #3b82f6; }

        .loading { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>Divine Enterprises</span> — Recruiting Dashboard</h1>
        <p>CDL-A Team Driver Candidates</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card blue"><div class="number" id="stat-total">-</div><div class="label">Total Candidates</div></div>
        <div class="stat-card green"><div class="number" id="stat-team">-</div><div class="label">Want Team</div></div>
        <div class="stat-card yellow"><div class="number" id="stat-new">-</div><div class="label">New / Unprocessed</div></div>
        <div class="stat-card purple"><div class="number" id="stat-careerplug">-</div><div class="label">CareerPlug</div></div>
        <div class="stat-card red"><div class="number" id="stat-cdljobs">-</div><div class="label">CDLjobs.com</div></div>
    </div>

    <div class="content">
        <div class="toolbar">
            <h2>All Candidates</h2>
            <div class="filters">
                <button class="filter-btn active" onclick="filterBy('all')">All</button>
                <button class="filter-btn" onclick="filterBy('team')">Team Only</button>
                <button class="filter-btn" onclick="filterBy('cdljobs')">CDLjobs</button>
                <button class="filter-btn" onclick="filterBy('careerplug')">CareerPlug</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Location</th>
                    <th>Source</th>
                    <th>Experience</th>
                    <th>Team</th>
                    <th>Endorsements</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="8" class="loading">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://psrsosfjteeovtmszwgu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzcnNvc2ZqdGVlb3Z0bXN6d2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MzI2MDAsImV4cCI6MjA4NzEwODYwMH0.15QS6GQ2cEWc-a1OVvzT1DlrExbdWGoRdEnYZ-ypgZs';

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allCandidates = [];

        async function loadCandidates() {
            const { data, error } = await db
                .from('candidates')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { console.error(error); return; }
            allCandidates = data;
            updateStats(data);
            renderTable(data);
        }

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-team').textContent = data.filter(c => c.wants_team).length;
            document.getElementById('stat-new').textContent = data.filter(c => c.status === 'New').length;
            document.getElementById('stat-careerplug').textContent = data.filter(c => c.source && c.source.includes('CareerPlug')).length;
            document.getElementById('stat-cdljobs').textContent = data.filter(c => c.source === 'CDLjobs.com').length;
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">No candidates found</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(c => {
                const sourceClass = c.source === 'CDLjobs.com' ? 'source-cdljobs' : 'source-careerplug';
                const sourceLabel = c.source === 'CDLjobs.com' ? 'CDLjobs' : 'CareerPlug';
                const teamHtml = c.wants_team ? '<span class="team-yes">TEAM</span>' : '<span class="team-no">Solo</span>';
                const endorsements = [
                    ...(c.endorsements || []),
                    ...(c.trailer_experience || [])
                ].filter(Boolean).join(', ') || '-';

                return `<tr>
                    <td><strong>${c.first_name || ''} ${c.last_name || ''}</strong><br><span style="color:#64748b;font-size:12px">${c.email || ''}</span></td>
                    <td>${c.phone || '-'}</td>
                    <td>${c.location || c.city ? (c.city || '') + ', ' + (c.state || '') : '-'}</td>
                    <td><span class="source-badge ${sourceClass}">${sourceLabel}</span></td>
                    <td>${c.experience || '-'}</td>
                    <td>${teamHtml}</td>
                    <td style="font-size:12px;max-width:150px">${endorsements}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${c.id}, this.value)">
                            ${['New','Screening','Team OK','Solo Only','Called','Sent Link','Hired'].map(s =>
                                `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`
                            ).join('')}
                        </select>
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateStatus(id, newStatus) {
            const { error } = await db
                .from('candidates')
                .update({ status: newStatus })
                .eq('id', id);

            if (error) { alert('Error updating status'); return; }

            // Update local data
            const candidate = allCandidates.find(c => c.id === id);
            if (candidate) candidate.status = newStatus;
            updateStats(allCandidates);
        }

        function filterBy(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            let filtered = allCandidates;
            if (type === 'team') filtered = allCandidates.filter(c => c.wants_team);
            if (type === 'cdljobs') filtered = allCandidates.filter(c => c.source === 'CDLjobs.com');
            if (type === 'careerplug') filtered = allCandidates.filter(c => c.source && c.source.includes('CareerPlug'));

            renderTable(filtered);
        }

        loadCandidates();
    </script>
</body>
</html>
